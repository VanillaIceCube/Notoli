map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 80;
  listen [::]:80;
  server_name notoli.judeandrewalaba.com;

  # Keep port 80 open so direct HTTP hits get upgraded to HTTPS.
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name notoli.judeandrewalaba.com;

  # Cloudflare Origin Certificate (mounted into the container)
  ssl_certificate     /etc/nginx/certs/origin.pem;
  ssl_certificate_key /etc/nginx/certs/origin.key;

  client_max_body_size 25m;

  # Backend routes (served from the subdomain root)
  # Keep these above the frontend catch-all so they win location matching.
  location = /api { return 301 /api/; }
  location ^~ /api/ {
    proxy_pass http://backend:8000;

    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location = /auth { return 301 /auth/; }
  location ^~ /auth/ {
    proxy_pass http://backend:8000;

    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location = /admin { return 301 /admin/; }
  location ^~ /admin/ {
    proxy_pass http://backend:8000;

    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # Django admin + DRF browsable API static (avoid clobbering frontend static assets)
  location ^~ /static/admin/ {
    proxy_pass http://backend:8000;

    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location ^~ /static/rest_framework/ {
    proxy_pass http://backend:8000;

    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # Frontend SPA, including deep links like /login and /workspace/...
  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;

    proxy_redirect off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }
}
