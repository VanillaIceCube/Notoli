name: OpenAI Response
description: Call OpenAI Responses API with a prompt prefix and diff content.
inputs:
  api_key:
    description: OpenAI API key.
    required: true
  project_id:
    description: OpenAI project ID.
    required: true
  prompt_prefix:
    description: Prompt text that will be prepended to the diff.
    required: true
  diff_path:
    description: Path to the diff file to append to the prompt.
    required: true
  system_prompt:
    description: System message to send with the request.
    required: false
    default: "You are an experienced, pragmatic PR assistant."
  model:
    description: OpenAI model name.
    required: false
    default: "gpt-5.6-luna"
outputs:
  content:
    description: Assistant response content.
    value: ${{ steps.chat.outputs.content }}
runs:
  using: composite
  steps:
    - id: chat
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.api_key }}
        OPENAI_PROJECT_ID: ${{ inputs.project_id }}
        PROMPT_PREFIX: ${{ inputs.prompt_prefix }}
        SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        MODEL: ${{ inputs.model }}
        DIFF_PATH: ${{ inputs.diff_path }}
      run: |
        set -euo pipefail

        write_content() {
          local content="$1"
          local delimiter
          delimiter="OPENAI_CONTENT_$(uuidgen)"
          {
            printf 'content<<%s\n' "$delimiter"
            printf '%s\n' "$content"
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_OUTPUT"
        }

        report_unavailable() {
          local detail="$1"
          echo "::warning title=OpenAI response unavailable::No usable OpenAI response was produced. Check quota or tokens, project access, credentials, and service availability."
          printf 'OpenAI failure detail: %s\n' "$detail" >&2
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### OpenAI response unavailable"
              echo
              echo "No usable OpenAI response was produced. Check API quota or tokens, project access, credentials, and service availability before rerunning."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        }

        missing_secrets=()
        if [ -z "${OPENAI_API_KEY}" ]; then
          missing_secrets+=("OPENAI_API_KEY")
        fi

        if [ -z "${OPENAI_PROJECT_ID}" ]; then
          missing_secrets+=("OPENAI_PROJECT_ID")
        fi

        if [ "${#missing_secrets[@]}" -gt 0 ]; then
          CONTENT="Missing secret(s): ${missing_secrets[*]}."
          write_content "$CONTENT"
          report_unavailable "$CONTENT"
          exit 0
        fi

        {
          printf '%s' "$PROMPT_PREFIX"
          cat "$DIFF_PATH"
        } > prompt.txt

        # Build JSON safely
        jq -n \
          --rawfile prompt prompt.txt \
          --arg model "$MODEL" \
          --arg system_prompt "$SYSTEM_PROMPT" \
          '
          {
            model: $model,
            instructions: $system_prompt,
            input: $prompt
          }
          ' > body.json

        # Make API request (project is passed via header)
        if ! RESPONSE=$(curl -sS \
          --connect-timeout 15 \
          --max-time 180 \
          -X POST "https://api.openai.com/v1/responses" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "OpenAI-Project: $OPENAI_PROJECT_ID" \
          --data @body.json); then
          CONTENT="OpenAI request failed before a response was received."
          write_content "$CONTENT"
          report_unavailable "$CONTENT"
          exit 0
        fi

        # Extract content or error.
        if ! CONTENT=$(echo "$RESPONSE" | jq -r '
          if .output then
            [
              .output[]
              | select(.type == "message")
              | .content[]
              | select(.type == "output_text")
              | .text
            ] | join("\n") as $text
            | if $text == "" then
                "OpenAI did not return usable output."
              else
                $text
              end
          elif .error and .error.message then
            "OpenAI API error: " + .error.message
          else
            "OpenAI did not return a response."
          end
        '); then
          CONTENT="OpenAI API error: the response was not valid JSON."
        fi

        echo "Response content:"
        echo "$CONTENT"

        write_content "$CONTENT"
        if [[ "$CONTENT" == OpenAI\ * ]]; then
          report_unavailable "$CONTENT"
        fi
