name: CodeQL Alert

on:
  schedule:
    - cron: '10 11 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    uses: ./.github/workflows/security-alerts.yml
    with:
      feed: codeql
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SECURITY_ALERTS_TOKEN: ${{ secrets.SECURITY_ALERTS_TOKEN }}
    permissions:
      contents: read
