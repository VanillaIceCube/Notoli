name: AI Build Sheriff Review

on:
  workflow_call:
    inputs:
      lint_result:
        required: false
        type: string
      test_result:
        required: false
        type: string
      lint_frontend_status:
        required: false
        type: string
      lint_frontend_log:
        required: false
        type: string
      lint_backend_status:
        required: false
        type: string
      lint_backend_log:
        required: false
        type: string
      test_frontend_status:
        required: false
        type: string
      test_frontend_log:
        required: false
        type: string
      test_backend_status:
        required: false
        type: string
      test_backend_log:
        required: false
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
      LINT_EASTWOOD_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Lint Eastwood build sheriff review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Lint Eastwood GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.LINT_EASTWOOD_APP_ID }}
          private-key: ${{ secrets.LINT_EASTWOOD_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Get PR diff
        id: pr-diff
        uses: ./.github/actions/get-pr-diff
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          max_bytes: "45000"

      - name: Build review context
        shell: bash
        env:
          CONTEXT_PATH: ${{ runner.temp }}/build-review-context.txt
          DIFF_PATH: ${{ steps.pr-diff.outputs.linediff_path }}
          LINT_RESULT: ${{ inputs.lint_result || 'unknown' }}
          TEST_RESULT: ${{ inputs.test_result || 'unknown' }}
          LINT_FRONTEND_STATUS: ${{ inputs.lint_frontend_status || 'not-applicable' }}
          LINT_FRONTEND_LOG: ${{ inputs.lint_frontend_log }}
          LINT_BACKEND_STATUS: ${{ inputs.lint_backend_status || 'not-applicable' }}
          LINT_BACKEND_LOG: ${{ inputs.lint_backend_log }}
          TEST_FRONTEND_STATUS: ${{ inputs.test_frontend_status || 'not-applicable' }}
          TEST_FRONTEND_LOG: ${{ inputs.test_frontend_log }}
          TEST_BACKEND_STATUS: ${{ inputs.test_backend_status || 'not-applicable' }}
          TEST_BACKEND_LOG: ${{ inputs.test_backend_log }}
        run: |
          {
            echo '=== BUILD, LINT, AND TEST EVIDENCE ==='
            printf 'lint_result: %s\n' "$LINT_RESULT"
            printf 'test_result: %s\n' "$TEST_RESULT"
            printf 'lint_frontend_status: %s\n' "$LINT_FRONTEND_STATUS"
            printf 'lint_backend_status: %s\n' "$LINT_BACKEND_STATUS"
            printf 'test_frontend_status: %s\n' "$TEST_FRONTEND_STATUS"
            printf 'test_backend_status: %s\n' "$TEST_BACKEND_STATUS"
            echo
            echo '--- lint_frontend_log ---'
            printf '%s\n' "$LINT_FRONTEND_LOG"
            echo
            echo '--- lint_backend_log ---'
            printf '%s\n' "$LINT_BACKEND_LOG"
            echo
            echo '--- test_frontend_log ---'
            printf '%s\n' "$TEST_FRONTEND_LOG"
            echo
            echo '--- test_backend_log ---'
            printf '%s\n' "$TEST_BACKEND_LOG"
            echo
            echo '=== LINE-NUMBERED PULL REQUEST DIFF ==='
            cat "$DIFF_PATH"
          } > "$CONTEXT_PATH"

      - name: Call Lint Eastwood
        id: openai
        uses: ./.github/actions/openai-chat
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          project_id: ${{ vars.OPENAI_PROJECT_ID }}
          diff_path: ${{ runner.temp }}/build-review-context.txt
          model: "gpt-5.6-luna"
          system_prompt: "You are Lint Eastwood, Notoli's AI Build Sheriff. Own lint failures, test failures, build/workflow failures, formatting/type-check style failures, and CI failure interpretation."
          prompt_prefix: |
            Review this pull request as Lint Eastwood, the AI Build Sheriff.

            Focus only on build, lint, test, formatting, type-check style, and CI failure interpretation. Do not perform general code review; Obi-Wan Code-nobi owns that. Do not aggregate CodeQL, Dependency Review, or malware findings; RoboCop owns those.

            Return ONLY strict JSON:
            {
              "event": "APPROVE" | "REQUEST_CHANGES" | "COMMENT",
              "body": "overall build/lint/test review summary",
              "comments": [
                { "path": "relative/file/path", "line": 123, "body": "inline comment tied to a failed check and valid added line" }
              ]
            }

            Rules:
            - If any lint/test/build status is failure and the failure appears caused by the PR, return REQUEST_CHANGES.
            - Use COMMENT only when the failure source is unclear, external, or infrastructure-related.
            - If all lint/test/build statuses are success or not-applicable, return APPROVE with a concise clean-build summary.
            - Use only line numbers shown as "A<line>:" in the diff.
            - Max 6 inline comments. If no valid line applies, put the finding in the body.
            - Clearly distinguish direct check output from your interpretation.

            Build evidence follows:

      - name: Publish Lint Eastwood native review
        uses: actions/github-script@v8
        env:
          REVIEW_BODY: ${{ steps.openai.outputs.content }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const raw = (process.env.REVIEW_BODY || '').trim();
            if (!raw || raw.startsWith('Missing secret') || raw.startsWith('OpenAI ')) {
              core.setFailed(raw || 'Lint Eastwood did not return a review.');
              return;
            }

            const stripCodeFences = (text) => {
              const trimmed = text.trim();
              if (!trimmed.startsWith('```')) return trimmed;
              return trimmed.replace(/^```[a-zA-Z]*\n?/, '').replace(/```$/, '').trim();
            };

            let parsed;
            try {
              parsed = JSON.parse(stripCodeFences(raw));
            } catch (error) {
              core.setFailed(`Lint Eastwood returned invalid JSON: ${error.message}`);
              return;
            }

            const events = new Set(['APPROVE', 'REQUEST_CHANGES', 'COMMENT']);
            const event = events.has(parsed.event) ? parsed.event : 'COMMENT';
            let body = typeof parsed.body === 'string' ? parsed.body.trim() : '';
            if (!body) body = 'Lint Eastwood completed a build review.';

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const valid = new Map();
            for (const file of files) {
              if (!file.patch) continue;
              let lineNumber;
              for (const line of file.patch.split(/\r?\n/)) {
                const hunk = line.match(/^@@ .* \+(\d+)/);
                if (hunk) { lineNumber = Number(hunk[1]); continue; }
                if (lineNumber == null) continue;
                if (line.startsWith('+') && !line.startsWith('+++')) {
                  if (!valid.has(file.filename)) valid.set(file.filename, new Set());
                  valid.get(file.filename).add(lineNumber);
                  lineNumber += 1;
                } else if (!line.startsWith('-')) {
                  lineNumber += 1;
                }
              }
            }

            let dropped = 0;
            const comments = [];
            for (const comment of Array.isArray(parsed.comments) ? parsed.comments : []) {
              const path = String(comment.path || '').replace(/^b\//, '').trim();
              const line = Number(comment.line);
              const text = typeof comment.body === 'string' ? comment.body.trim() : '';
              if (!path || !text || Number.isNaN(line) || !valid.get(path)?.has(line)) {
                dropped += 1;
                continue;
              }
              comments.push({ path, line, side: 'RIGHT', body: text });
              if (comments.length >= 6) break;
            }
            if (dropped > 0) {
              body += `\n\nNote: ${dropped} inline comment(s) could not be placed on valid added lines.`;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event,
              body,
              comments: comments.length ? comments : undefined,
            });
