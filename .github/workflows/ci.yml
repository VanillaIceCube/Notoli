name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches-ignore:
      - env-prod

concurrency:
  group: continuous-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lints:
    name: Lints
    uses: ./.github/workflows/lint-gate.yml
    with:
      checkout_ref: ${{ github.event.pull_request.head.ref }}

  tests:
    name: Tests
    uses: ./.github/workflows/test-gate.yml

  codeql:
    name: CodeQL
    uses: ./.github/workflows/codeql-gate.yml
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write

  dependency-vulnerability:
    name: Vulnerability
    uses: ./.github/workflows/vulnerability-gate.yml
    permissions:
      contents: read
      pull-requests: write

  dependency-malware:
    name: Malware
    uses: ./.github/workflows/malware-gate.yml
    permissions:
      contents: read
      pull-requests: write

  commentary:
    name: Commentary
    needs: [lints, tests, codeql, dependency-vulnerability, dependency-malware]
    if: >-
      always() &&
      (
        github.event.pull_request.user.login != 'dependabot[bot]' ||
        needs.lints.result == 'failure' ||
        needs.tests.result == 'failure' ||
        needs.lints.outputs.lint_frontend_status == 'failure' ||
        needs.lints.outputs.lint_backend_status == 'failure' ||
        needs.tests.outputs.test_frontend_status == 'failure' ||
        needs.tests.outputs.test_backend_status == 'failure'
      )
    uses: ./.github/workflows/commentary.yml
    secrets: inherit
    with:
      lint_frontend_status: ${{ needs.lints.outputs.lint_frontend_status }}
      lint_frontend_log: ${{ needs.lints.outputs.lint_frontend_log }}
      lint_backend_status: ${{ needs.lints.outputs.lint_backend_status }}
      lint_backend_log: ${{ needs.lints.outputs.lint_backend_log }}
      test_frontend_status: ${{ needs.tests.outputs.test_frontend_status }}
      test_frontend_log: ${{ needs.tests.outputs.test_frontend_log }}
      test_backend_status: ${{ needs.tests.outputs.test_backend_status }}
      test_backend_log: ${{ needs.tests.outputs.test_backend_log }}

  security-review:
    name: AI Security Review
    needs: [lints, tests, codeql, dependency-vulnerability, dependency-malware]
    if: always() && github.event_name == 'pull_request'
    uses: ./.github/workflows/security-review.yml
    secrets: inherit
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: write
      security-events: read
    with:
      lint_frontend_status: ${{ needs.lints.outputs.lint_frontend_status }}
      lint_frontend_log: ${{ needs.lints.outputs.lint_frontend_log }}
      lint_backend_status: ${{ needs.lints.outputs.lint_backend_status }}
      lint_backend_log: ${{ needs.lints.outputs.lint_backend_log }}
      test_frontend_status: ${{ needs.tests.outputs.test_frontend_status }}
      test_frontend_log: ${{ needs.tests.outputs.test_frontend_log }}
      test_backend_status: ${{ needs.tests.outputs.test_backend_status }}
      test_backend_log: ${{ needs.tests.outputs.test_backend_log }}

  auto-merge:
    name: Auto Merge
    needs: [lints, tests, codeql, dependency-vulnerability, dependency-malware]
    if: >-
      always() &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      needs.lints.result == 'success' &&
      needs.tests.result == 'success' &&
      needs.dependency-vulnerability.result == 'success' &&
      needs.dependency-malware.result == 'success'
    uses: ./.github/workflows/auto_merge.yml
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read
