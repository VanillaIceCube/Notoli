name: AI Code Review

on:
  workflow_call:
    secrets:
      OPENAI_API_KEY:
        required: true
      OBI_WAN_CODE_NOBI_PRIVATE_KEY:
        required: true

concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Obi-Wan Code-nobi code review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Obi-Wan Code-nobi GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.OBI_WAN_CODE_NOBI_APP_ID }}
          private-key: ${{ secrets.OBI_WAN_CODE_NOBI_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Collect prior Obi-Wan Code-nobi reviews
        uses: ./.github/actions/collect-prior-ai-reviews
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          persona_name: "Obi-Wan Code-nobi"
          output_path: ${{ runner.temp }}/code-prior-reviews.json

      - name: Get PR diff
        id: pr-diff
        uses: ./.github/actions/get-pr-diff
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          max_bytes: "120000"

      - name: Build code review context
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DIFF_PATH: ${{ steps.pr-diff.outputs.linediff_path }}
          PRIOR_REVIEWS_PATH: ${{ runner.temp }}/code-prior-reviews.json
          CONTEXT_PATH: ${{ runner.temp }}/code-review-context.txt
        run: |
          set -euo pipefail

          {
            echo '=== REPOSITORY FILE MAP ==='
            git ls-files | sed 's#^#- #'
            echo
            echo '=== CHANGED FILES ==='
            git diff --name-status "$BASE_SHA" "$HEAD_SHA"
            echo
            echo '=== CURRENT CONTENTS OF CHANGED TEXT FILES ==='
          } > "$CONTEXT_PATH"

          total_bytes=0
          max_total_bytes=180000
          max_file_bytes=30000
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              continue
            fi
            if ! grep -Iq . "$file"; then
              {
                echo
                printf -- '--- %s ---\n' "$file"
                echo '[binary or non-text file omitted]'
              } >> "$CONTEXT_PATH"
              continue
            fi

            file_bytes=$(wc -c < "$file" || echo 0)
            if [ "$total_bytes" -ge "$max_total_bytes" ]; then
              {
                echo
                printf -- '--- %s ---\n' "$file"
                echo '[omitted: changed-file context byte budget reached]'
              } >> "$CONTEXT_PATH"
              continue
            fi

            remaining=$((max_total_bytes - total_bytes))
            limit=$max_file_bytes
            if [ "$remaining" -lt "$limit" ]; then
              limit=$remaining
            fi

            {
              echo
              printf -- '--- %s ---\n' "$file"
              if [ "$file_bytes" -gt "$limit" ]; then
                head -c "$limit" "$file"
                echo
                printf '[truncated: %s bytes total, showed %s bytes]\n' "$file_bytes" "$limit"
              else
                cat "$file"
              fi
            } >> "$CONTEXT_PATH"

            if [ "$file_bytes" -gt "$limit" ]; then
              total_bytes=$((total_bytes + limit))
            else
              total_bytes=$((total_bytes + file_bytes))
            fi
          done < <(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA")

          if [ "$total_bytes" -gt "$max_total_bytes" ]; then
            echo "Changed-file context exceeded budget: $total_bytes > $max_total_bytes" >&2
            exit 1
          fi

          {
            echo
            printf 'Changed-file context bytes included: %s / %s\n' "$total_bytes" "$max_total_bytes"
            echo
            echo '=== PRIOR OBI-WAN CODE-NOBI REVIEWS ==='
            cat "$PRIOR_REVIEWS_PATH"
            echo
            echo '=== LINE-NUMBERED PULL REQUEST DIFF ==='
            cat "$DIFF_PATH"
          } >> "$CONTEXT_PATH"

      - name: Call Obi-Wan Code-nobi
        id: openai
        uses: ./.github/actions/openai-chat
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          project_id: ${{ vars.OPENAI_PROJECT_ID }}
          diff_path: ${{ runner.temp }}/code-review-context.txt
          model: "gpt-5.6-luna"
          system_prompt: "You are Obi-Wan Code-nobi, Notoli's AI Code Reviewer. Focus on correctness, maintainability, architecture, edge cases, missing tests, API/UX concerns, and overall code quality. Sound like a calm senior reviewer: measured, thoughtful, and lightly encouraging when things are sound. A subtle Star Wars cadence is acceptable, but avoid roleplay, catchphrases, or jokes in technical findings."
          prompt_prefix: |
            Review this pull request as Obi-Wan Code-nobi, the AI Code Reviewer for the Notoli project (Backend: Django; Frontend: React + MUI; Docker; GitHub Actions).

            Scope:
            - Own general implementation review: correctness, maintainability, architecture, edge cases, missing tests, API/UX concerns, and overall code quality.
            - Do not aggregate CodeQL, Dependency Review, or malware scanner findings; RoboCop owns security interpretation.
            - Do not interpret lint/test/build failures; Lint Eastwood owns build and failed-check interpretation.
            - Avoid style nitpicks.
            - If you are unsure, say so.
            - Read your prior review history below before deciding what to publish.
            - Do not repost previously reported findings unless the evidence has changed.
            - If there is nothing materially new to add, keep the correct event and write a concise status body with no inline comments.
            - Let the body show a little Obi-Wan Code-nobi personality in the summary sentence and section phrasing. Keep inline comments especially restrained and professional.

            Return ONLY strict JSON:
            {
              "event": "APPROVE" | "REQUEST_CHANGES" | "COMMENT",
              "body": "overall code review summary",
              "comments": [
                { "path": "relative/file/path", "line": 123, "body": "inline review comment" }
              ]
            }

            Rules:
            - Use REQUEST_CHANGES for correctness, API/UX, architecture, maintainability, or missing-test issues that should block merge.
            - Use APPROVE when the implementation looks sound.
            - Use COMMENT for non-blocking observations.
            - Use only line numbers shown as "A<line>:" in the diff.
            - Inline comments are optional. Add one only when it is useful and tied to an exact valid added "A<line>:" line in the diff.
            - If a finding comes from repository context, changed-file contents, a deleted line, an unchanged line, or any line not shown as "A<line>:", put the finding in the body and do not add an inline comment for it.
            - If the diff is truncated, mention it in the body.
            - Format the body in concise GitHub Markdown with clear line breaks: put one blank line after each heading and one blank line between sections. Use one restrained emoji per section heading.
            - Use this section shape:
              - "## 🧭 Obi-Wan Code-nobi verdict" with the decision and one measured, slightly mentor-like summary sentence.
              - "## 🔎 Findings" with bullets for new findings, or "No new findings." when clear.
              - "## 📚 Evidence checked" with short bullets naming the diff/context reviewed and any prior-review history used.
              - "## ✅ Next steps" only when there is a concrete action for the author.
            - Do not put emojis inside inline review comments.

            Review context follows:

      - name: Publish Obi-Wan Code-nobi native review
        uses: ./.github/actions/publish-ai-review
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          review_json: ${{ steps.openai.outputs.content }}
          persona_name: "Obi-Wan Code-nobi"
          default_body: "Obi-Wan Code-nobi completed a code review."
