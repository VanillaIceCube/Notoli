name: CodeQL Gate

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/codeql/**"
  schedule:
    - cron: "24 10 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

jobs:
  changes:
    name: Detect CodeQL Scope
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.scope.outputs.python }}
      javascript: ${{ steps.scope.outputs.javascript }}
      actions: ${{ steps.scope.outputs.actions }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        with:
          filters: |
            python:
              - 'backend/**'
              - '.github/actions/**'
              - '.github/workflows/**'
              - '.github/codeql/**'
            javascript:
              - 'frontend/**'
              - '.github/actions/**'
              - '.github/workflows/**'
              - '.github/codeql/**'
            actions:
              - '.github/actions/**'
              - '.github/workflows/**'
              - '.github/codeql/**'

      - name: Fall back to local path detection
        id: fallback
        if: github.event_name == 'pull_request' && steps.filter.outcome == 'failure'
        uses: ./.github/actions/path-filter-fallback
        with:
          profile: codeql
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}

      - name: Resolve pull-request scope
        id: pr-scope
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PRIMARY_OUTCOME: ${{ steps.filter.outcome }}
          PRIMARY_PYTHON: ${{ steps.filter.outputs.python }}
          PRIMARY_JAVASCRIPT: ${{ steps.filter.outputs.javascript }}
          PRIMARY_ACTIONS: ${{ steps.filter.outputs.actions }}
          FALLBACK_OUTCOME: ${{ steps.fallback.outcome }}
          FALLBACK_PYTHON: ${{ steps.fallback.outputs.python }}
          FALLBACK_JAVASCRIPT: ${{ steps.fallback.outputs.javascript }}
          FALLBACK_ACTIONS: ${{ steps.fallback.outputs.actions }}
        run: |
          if [ "$PRIMARY_OUTCOME" = "success" ]; then
            {
              echo "python=$PRIMARY_PYTHON"
              echo "javascript=$PRIMARY_JAVASCRIPT"
              echo "actions=$PRIMARY_ACTIONS"
            } >> "$GITHUB_OUTPUT"
          elif [ "$FALLBACK_OUTCOME" = "success" ]; then
            {
              echo "python=$FALLBACK_PYTHON"
              echo "javascript=$FALLBACK_JAVASCRIPT"
              echo "actions=$FALLBACK_ACTIONS"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::error title=Path detection unavailable::Both primary and fallback CodeQL path detection failed."
            exit 1
          fi

      - name: Set analysis scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "python=${{ steps.pr-scope.outputs.python }}"
              echo "javascript=${{ steps.pr-scope.outputs.javascript }}"
              # Keep the Actions configuration present for relevant PRs so
              # GitHub can compare it with the configuration on the base branch.
              if [ "${{ steps.pr-scope.outputs.actions }}" = "true" ] || \
                 [ "${{ steps.pr-scope.outputs.python }}" = "true" ] || \
                 [ "${{ steps.pr-scope.outputs.javascript }}" = "true" ]; then
                echo "actions=true"
              else
                echo "actions=false"
              fi
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "python=true"
              echo "javascript=true"
              echo "actions=true"
            } >> "$GITHUB_OUTPUT"
          fi

  analyze-python:
    name: Analyze Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  analyze-javascript:
    name: Analyze JavaScript/TypeScript
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  analyze-actions:
    name: Analyze GitHub Actions
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"
