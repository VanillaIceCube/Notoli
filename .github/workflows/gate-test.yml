name: Test Gate

on:
  workflow_call:
    outputs:
      test_frontend_status:
        description: Frontend test status (success/failure/not-applicable).
        value: ${{ jobs.test-results.outputs.frontend_status }}
      test_frontend_log:
        description: Frontend test log tail.
        value: ${{ jobs.test-results.outputs.frontend_log }}
      test_backend_status:
        description: Backend test status (success/failure/not-applicable).
        value: ${{ jobs.test-results.outputs.backend_status }}
      test_backend_log:
        description: Backend test log tail.
        value: ${{ jobs.test-results.outputs.backend_log }}
      test_automation_status:
        description: Repository automation test status (success/failure/not-applicable).
        value: ${{ jobs.test-results.outputs.automation_status }}
      test_automation_log:
        description: Repository automation test log tail.
        value: ${{ jobs.test-results.outputs.automation_log }}

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.scope.outputs.frontend }}
      backend: ${{ steps.scope.outputs.backend }}
      automation: ${{ steps.scope.outputs.automation }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        continue-on-error: true
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/actions/read-versions/**'
            backend:
              - 'backend/**'
              - '.github/actions/read-versions/**'
            automation:
              - '.github/actions/path-filter-fallback/**'
              - '.github/actions/publish-ai-review/**'
              - '.github/actions/security-alerts/**'

      - name: Fall back to local path detection
        id: fallback
        if: steps.filter.outcome == 'failure'
        uses: ./.github/actions/path-filter-fallback
        with:
          profile: test
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}

      - name: Resolve test scope
        id: scope
        if: always()
        shell: bash
        env:
          PRIMARY_OUTCOME: ${{ steps.filter.outcome }}
          PRIMARY_FRONTEND: ${{ steps.filter.outputs.frontend }}
          PRIMARY_BACKEND: ${{ steps.filter.outputs.backend }}
          PRIMARY_AUTOMATION: ${{ steps.filter.outputs.automation }}
          FALLBACK_OUTCOME: ${{ steps.fallback.outcome }}
          FALLBACK_FRONTEND: ${{ steps.fallback.outputs.frontend }}
          FALLBACK_BACKEND: ${{ steps.fallback.outputs.backend }}
          FALLBACK_AUTOMATION: ${{ steps.fallback.outputs.automation }}
        run: |
          if [ "$PRIMARY_OUTCOME" = "success" ]; then
            {
              echo "frontend=$PRIMARY_FRONTEND"
              echo "backend=$PRIMARY_BACKEND"
              echo "automation=$PRIMARY_AUTOMATION"
            } >> "$GITHUB_OUTPUT"
          elif [ "$FALLBACK_OUTCOME" = "success" ]; then
            {
              echo "frontend=$FALLBACK_FRONTEND"
              echo "backend=$FALLBACK_BACKEND"
              echo "automation=$FALLBACK_AUTOMATION"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::error title=Path detection unavailable::Both primary and fallback test path detection failed."
            exit 1
          fi

  frontend-tests:
    name: Frontend Tests (React)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Read versions
        id: versions
        uses: ./.github/actions/read-versions
        with:
          read_python: "false"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node_version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        id: test_run
        continue-on-error: true
        env:
          CI: true
        run: |
          set -o pipefail
          status=0
          npm test -- --watchAll=false --verbose --runInBand 2>&1 | tee test_output.txt || status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Test summary
        id: test_summary
        if: always()
        run: |
          exit_code="${{ steps.test_run.outputs.exit_code }}"
          if [ -z "$exit_code" ]; then
            exit_code=1
          fi
          if [ "$exit_code" = "0" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'log<<EOF'
            if [ -f test_output.txt ]; then
              tail -n 200 test_output.txt
            else
              echo "No test output captured."
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: steps.test_run.outputs.exit_code != '0'
        run: exit 1
    outputs:
      status: ${{ steps.test_summary.outputs.status }}
      log: ${{ steps.test_summary.outputs.log }}

  backend-tests:
    name: Backend Tests (Django)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Read versions
        id: versions
        uses: ./.github/actions/read-versions
        with:
          read_node: "false"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python_version }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        id: test_run
        continue-on-error: true
        run: |
          set -o pipefail
          status=0
          python manage.py test --verbosity=2 2>&1 | tee test_output.txt || status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Test summary
        id: test_summary
        if: always()
        run: |
          exit_code="${{ steps.test_run.outputs.exit_code }}"
          if [ -z "$exit_code" ]; then
            exit_code=1
          fi
          if [ "$exit_code" = "0" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'log<<EOF'
            if [ -f test_output.txt ]; then
              tail -n 200 test_output.txt
            else
              echo "No test output captured."
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: steps.test_run.outputs.exit_code != '0'
        run: exit 1
    outputs:
      status: ${{ steps.test_summary.outputs.status }}
      log: ${{ steps.test_summary.outputs.log }}

  automation-tests:
    name: Automation Tests (Node)
    needs: changes
    if: needs.changes.outputs.automation == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read versions
        id: versions
        uses: ./.github/actions/read-versions
        with:
          read_python: "false"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node_version }}

      - name: Run repository automation tests
        id: test_run
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          status=0
          node --test \
            .github/actions/path-filter-fallback/path-filter-fallback.test.js \
            .github/actions/publish-ai-review/publish-ai-review.test.js \
            .github/actions/security-alerts/sync-security-alerts.test.js \
            2>&1 | tee automation_test_output.txt || status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Test summary
        id: test_summary
        if: always()
        shell: bash
        run: |
          exit_code="${{ steps.test_run.outputs.exit_code }}"
          if [ -z "$exit_code" ]; then
            exit_code=1
          fi
          if [ "$exit_code" = "0" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'log<<EOF'
            if [ -f automation_test_output.txt ]; then
              tail -n 200 automation_test_output.txt
            else
              echo "No automation test output captured."
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: steps.test_run.outputs.exit_code != '0'
        run: exit 1
    outputs:
      status: ${{ steps.test_summary.outputs.status }}
      log: ${{ steps.test_summary.outputs.log }}

  test-results:
    name: Test Results
    if: always()
    needs: [changes, frontend-tests, backend-tests, automation-tests]
    runs-on: ubuntu-latest
    outputs:
      frontend_status: ${{ steps.results.outputs.frontend_status }}
      frontend_log: ${{ steps.results.outputs.frontend_log }}
      backend_status: ${{ steps.results.outputs.backend_status }}
      backend_log: ${{ steps.results.outputs.backend_log }}
      automation_status: ${{ steps.results.outputs.automation_status }}
      automation_log: ${{ steps.results.outputs.automation_log }}
    steps:
      - name: Normalize test results
        id: results
        env:
          FRONTEND_RELEVANT: ${{ needs.changes.outputs.frontend }}
          FRONTEND_STATUS: ${{ needs.frontend-tests.outputs.status }}
          FRONTEND_LOG: ${{ needs.frontend-tests.outputs.log }}
          BACKEND_RELEVANT: ${{ needs.changes.outputs.backend }}
          BACKEND_STATUS: ${{ needs.backend-tests.outputs.status }}
          BACKEND_LOG: ${{ needs.backend-tests.outputs.log }}
          AUTOMATION_RELEVANT: ${{ needs.changes.outputs.automation }}
          AUTOMATION_STATUS: ${{ needs.automation-tests.outputs.status }}
          AUTOMATION_LOG: ${{ needs.automation-tests.outputs.log }}
        shell: bash
        run: |
          if [ "$FRONTEND_RELEVANT" = "true" ]; then
            echo "frontend_status=${FRONTEND_STATUS:-failure}" >> "$GITHUB_OUTPUT"
            {
              echo 'frontend_log<<EOF'
              echo "$FRONTEND_LOG"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "frontend_status=not-applicable" >> "$GITHUB_OUTPUT"
            echo "frontend_log=No frontend-relevant changes." >> "$GITHUB_OUTPUT"
          fi

          if [ "$BACKEND_RELEVANT" = "true" ]; then
            echo "backend_status=${BACKEND_STATUS:-failure}" >> "$GITHUB_OUTPUT"
            {
              echo 'backend_log<<EOF'
              echo "$BACKEND_LOG"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "backend_status=not-applicable" >> "$GITHUB_OUTPUT"
            echo "backend_log=No backend-relevant changes." >> "$GITHUB_OUTPUT"
          fi

          if [ "$AUTOMATION_RELEVANT" = "true" ]; then
            echo "automation_status=${AUTOMATION_STATUS:-failure}" >> "$GITHUB_OUTPUT"
            {
              echo 'automation_log<<EOF'
              echo "$AUTOMATION_LOG"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "automation_status=not-applicable" >> "$GITHUB_OUTPUT"
            echo "automation_log=No repository-automation-relevant changes." >> "$GITHUB_OUTPUT"
          fi

          if [ "$FRONTEND_RELEVANT" = "true" ] && [ "${FRONTEND_STATUS:-failure}" != "success" ]; then
            exit 1
          fi
          if [ "$BACKEND_RELEVANT" = "true" ] && [ "${BACKEND_STATUS:-failure}" != "success" ]; then
            exit 1
          fi
          if [ "$AUTOMATION_RELEVANT" = "true" ] && [ "${AUTOMATION_STATUS:-failure}" != "success" ]; then
            exit 1
          fi
